name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      # Generate the Prisma client so all Prisma-derived types
      # (EventStatus, ConnectionStatus, Prisma.AttendeeWhereInput, etc.)
      # are available before tsc runs. Belt + suspenders: postinstall in
      # apps/api also runs `prisma generate`, but explicit step here keeps
      # CI deterministic if npm ever changes postinstall behaviour.
      - run: npm run db:generate --workspace=apps/api
      - run: npx turbo lint type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run db:generate --workspace=apps/api
      - run: npx turbo test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run db:generate --workspace=apps/api
      - run: npx turbo build
